<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>착한한우 관리자 대시보드</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .sidebar {
      width: 220px;
      background-color: #2c3e50;
      color: white;
      position: fixed;
      height: 100%;
      padding-top: 20px;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 20px;
    }
    .sidebar a {
      padding: 15px 20px;
      display: block;
      color: white;
      text-decoration: none;
      font-size: 16px;
    }
    .sidebar a:hover {
      background-color: #34495e;
    }
    .main {
      margin-left: 220px;
      padding: 20px;
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>착한한우 관리자</h2>
  <a href="#" onclick="showSection('orders')">1. 받은 주문</a>
  <a href="#" onclick="showSection('stats')">2. 대시보드 통계</a>
  <a href="#" onclick="showSection('logs')">3. 고객 행동 로그</a>
  <a href="#" onclick="showSection('hours')">4. 시간대 분석</a>
</div>

<div class="main">
  <div id="orders" class="section active">
    <h1>받은 주문</h1>
    <p>여기에 주문 목록 테이블이 들어갑니다.</p>
  </div>
  <div id="stats" class="section">
    <h1>대시보드 통계</h1>
    <p>총 주문 수, 인기 제품 순위 등을 표시합니다.</p>
  </div>
  <div id="logs" class="section">
    <h1>고객 행동 로그</h1>
    <p>고기 선택, 결제 진입 등 로그를 기반으로 이탈 분석합니다.</p>
  </div>
  <div id="hours" class="section">
    <h1>시간대별 주문 분석</h1>
    <p>시간대별 주문 분포 그래프가 들어갑니다.</p>
  </div>
</div>

<script>
  function showSection(id) {
    const sections = document.querySelectorAll('.section');
    sections.forEach(section => section.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>

</body>
</html>
